<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Access your saved CineVerse watchlist with movies and TV shows you want to stream later." />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#05070d" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <title>My List | CineVerse</title>
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="my-list">
    <div class="site-shell">
      <header id="siteHeader"></header>

      <main>
        <section class="page-hero">
          <div>
            <p class="eyebrow">Saved for later</p>
            <h1>Your curated watchlist.</h1>
            <p>Everything you have added stays ready for your next movie night.</p>
          </div>
        </section>

        <section class="section">
          <div class="filters-panel compact">
            <label class="field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Search your list" />
            </label>
            <label class="field">
              <span>Genre</span>
              <select id="genreFilter">
                <option value="All">All genres</option>
              </select>
            </label>
            <label class="field">
              <span>Year</span>
              <select id="yearFilter">
                <option value="Any">Any year</option>
              </select>
            </label>
            <label class="field">
              <span>Rating</span>
              <select id="ratingFilter">
                <option value="All">Any rating</option>
              </select>
            </label>
          </div>
          <div id="catalogGrid" class="card-grid"></div>
        </section>
      </main>

      <footer id="siteFooter"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="../js/app.js" defer></script>
  </body>
</html>
