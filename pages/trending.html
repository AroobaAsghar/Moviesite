<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="See what is trending now on CineVerse, including popular movies, hit TV shows, and high-demand trailers." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#05070d" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <meta property="og:title" content="Trending Movies and Shows | CineVerse" />
    <meta property="og:description" content="Track the movies and TV shows viewers are watching this week on CineVerse." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Trending Movies and Shows | CineVerse</title>
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="trending">
    <div class="site-shell">
      <header id="siteHeader"></header>

      <main>
        <section class="page-hero">
          <div>
            <p class="eyebrow">The pulse of the platform</p>
            <h1>Trending right now.</h1>
            <p>See what everyone is talking about and start streaming instantly.</p>
          </div>
        </section>

        <section class="section">
          <div class="filters-panel compact">
            <label class="field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Search trending titles" />
            </label>
            <label class="field">
              <span>Genre</span>
              <select id="genreFilter">
                <option value="All">All genres</option>
              </select>
            </label>
            <label class="field">
              <span>Year</span>
              <select id="yearFilter">
                <option value="Any">Any year</option>
              </select>
            </label>
            <label class="field">
              <span>Rating</span>
              <select id="ratingFilter">
                <option value="All">Any rating</option>
              </select>
            </label>
          </div>
          <div id="catalogGrid" class="card-grid"></div>
        </section>
      </main>

      <footer id="siteFooter"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="../js/app.js" defer></script>
  </body>
</html>
