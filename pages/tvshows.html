<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover popular and top-rated TV shows on CineVerse with live search, genre filters, ratings, and watchlist support." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#05070d" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <meta property="og:title" content="TV Shows | CineVerse" />
    <meta property="og:description" content="Browse popular TV series and discover your next binge-worthy show on CineVerse." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>TV Shows | CineVerse</title>
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="tvshows">
    <div class="site-shell">
      <header id="siteHeader"></header>

      <main>
        <section class="page-hero">
          <div>
            <p class="eyebrow">Series collection</p>
            <h1>Immersive worlds, episodic by design.</h1>
            <p>Discover premium television with breathtaking production and unforgettable characters.</p>
          </div>
        </section>

        <section class="section">
          <div class="filters-panel compact">
            <label class="field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Search TV shows" />
            </label>
            <label class="field">
              <span>Genre</span>
              <select id="genreFilter">
                <option value="All">All genres</option>
              </select>
            </label>
            <label class="field">
              <span>Year</span>
              <select id="yearFilter">
                <option value="Any">Any year</option>
              </select>
            </label>
            <label class="field">
              <span>Rating</span>
              <select id="ratingFilter">
                <option value="All">Any rating</option>
              </select>
            </label>
          </div>
          <div id="catalogGrid" class="card-grid"></div>
        </section>
      </main>

      <footer id="siteFooter"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="../js/app.js" defer></script>
  </body>
</html>
