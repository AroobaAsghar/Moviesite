<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Search CineVerse for movies, TV shows, genres, trailers, ratings, years, and personalized watchlist titles." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#05070d" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <meta property="og:title" content="Search Movies and TV Shows | CineVerse" />
    <meta property="og:description" content="Find movies and TV series quickly with CineVerse live search and filters." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Search Movies and TV Shows | CineVerse</title>
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="search">
    <div class="site-shell">
      <header id="siteHeader"></header>

      <main>
        <section class="page-hero">
          <div>
            <p class="eyebrow">Search results</p>
            <h1>Find your next stream.</h1>
            <p>Search by title, cast, genre, mood, year, or rating across the CineVerse catalog.</p>
          </div>
        </section>

        <section class="section">
          <div class="filters-panel">
            <label class="field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Search everything" />
            </label>
            <label class="field">
              <span>Genre</span>
              <select id="genreFilter">
                <option value="All">All genres</option>
              </select>
            </label>
            <label class="field">
              <span>Year</span>
              <select id="yearFilter">
                <option value="Any">Any year</option>
              </select>
            </label>
            <label class="field">
              <span>Rating</span>
              <select id="ratingFilter">
                <option value="All">Any rating</option>
              </select>
            </label>
          </div>
          <div id="searchGrid" class="card-grid"></div>
        </section>
      </main>

      <footer id="siteFooter"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="../js/app.js" defer></script>
  </body>
</html>
